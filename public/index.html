<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Push - Admin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
        .refresh-btn {
            background-color: transparent;
            border: 1px solid #007bff;
            color: #007bff;
            padding: 4px 8px;
            font-size: 12px;
            margin-top: 5px;
            width: auto;
            display: inline-block;
        }
        .refresh-btn:hover {
            background-color: #e9f2ff;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>FCM Dashboard</h2>
    <div class="form-group">
        <label for="target">Destinatario</label>
        <select id="target">
            <option value="global">Todos (Tema: global)</option>
        </select>
        <button class="refresh-btn" id="refreshBtn">🔄 Refrescar dispositivos conectados</button>
    </div>
    <div class="form-group">
        <label for="title">Título del mensaje</label>
        <input type="text" id="title" placeholder="Ej: Nueva actualización" required>
    </div>
    <div class="form-group">
        <label for="body">Cuerpo del mensaje</label>
        <textarea id="body" placeholder="Escribe el mensaje aquí..." required></textarea>
    </div>
    <button id="sendBtn">Enviar Notificación</button>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    const targetSelect = document.getElementById('target');
    const refreshBtn = document.getElementById('refreshBtn');
    
    // Función para cargar los usuarios conectados desde el servidor
    async function loadUsers() {
        try {
            const response = await fetch('/users');
            const data = await response.json();
            
            // Guardar opción global
            targetSelect.innerHTML = '<option value="global">Todos (Tema: global)</option>';
            
            if (data.success && data.users && data.users.length > 0) {
                data.users.forEach(userId => {
                    const option = document.createElement('option');
                    option.value = userId;
                    option.textContent = `Usuario individual: ${userId}`;
                    targetSelect.appendChild(option);
                });
            }
        } catch (error) {
            console.error("Error al cargar usuarios:", error);
        }
    }

    refreshBtn.addEventListener('click', loadUsers);
    
    // Cargar usuarios al inicio
    loadUsers();

    document.getElementById('sendBtn').addEventListener('click', async () => {
        const target = targetSelect.value;
        const title = document.getElementById('title').value.trim();
        const body = document.getElementById('body').value.trim();
        const statusMsg = document.getElementById('statusMsg');
        const btn = document.getElementById('sendBtn');

        if (!title || !body) {
            statusMsg.className = 'status error';
            statusMsg.textContent = 'Por favor, llena título y cuerpo.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Enviando...';
        statusMsg.className = 'status'; // hide

        try {
            let endpoint = '';
            let payload = {};

            if (target === 'global') {
                endpoint = '/send-message';
                payload = { title, body };
            } else {
                endpoint = '/send-to-user';
                payload = { userId: target, title, body };
            }

            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok && data.success) {
                statusMsg.className = 'status success';
                statusMsg.textContent = target === 'global' ? '¡Mensaje global enviado exitosamente!' : `¡Mensaje enviado exitosamente al usuario ${target}!`;
                document.getElementById('title').value = '';
                document.getElementById('body').value = '';
            } else {
                statusMsg.className = 'status error';
                statusMsg.textContent = data.error || 'Hubo un error al enviar el mensaje.';
            }
        } catch (err) {
            statusMsg.className = 'status error';
            statusMsg.textContent = 'Error de conexión con el servidor.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Enviar Notificación';
        }
    });
</script>

</body>
</html>
