<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Mensaje Push - Admin</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            display: none;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Notificación Global</h2>
    <div class="form-group">
        <label for="title">Título del mensaje</label>
        <input type="text" id="title" placeholder="Ej: Nueva actualización" required>
    </div>
    <div class="form-group">
        <label for="body">Cuerpo del mensaje</label>
        <textarea id="body" placeholder="Escribe el mensaje aquí..." required></textarea>
    </div>
    <button id="sendBtn">Send Message</button>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
        const title = document.getElementById('title').value.trim();
        const body = document.getElementById('body').value.trim();
        const statusMsg = document.getElementById('statusMsg');
        const btn = document.getElementById('sendBtn');

        if (!title || !body) {
            statusMsg.className = 'status error';
            statusMsg.textContent = 'Por favor, llena ambos campos.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Enviando...';
        statusMsg.className = 'status'; // hide

        try {
            const response = await fetch('/send-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, body })
            });

            const data = await response.json();

            if (response.ok && data.success) {
                statusMsg.className = 'status success';
                statusMsg.textContent = '¡Mensaje enviado exitosamente!';
                document.getElementById('title').value = '';
                document.getElementById('body').value = '';
            } else {
                statusMsg.className = 'status error';
                statusMsg.textContent = data.error || 'Hubo un error al enviar el mensaje.';
            }
        } catch (err) {
            statusMsg.className = 'status error';
            statusMsg.textContent = 'Error de conexión con el servidor.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Message';
        }
    });
</script>

</body>
</html>
